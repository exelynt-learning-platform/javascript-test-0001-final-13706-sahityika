<!DOCTYPE html>
<html>
<body>

<script>
let n = 9;
let mid = Math.floor(n/2);

for (let i = 0; i < n; i++) {

    let spaces = Math.abs(mid - i);

    for (let j = 0; j < spaces; j++) {
        document.write("&nbsp;");
    }

    document.write("*");

    let inner = n - 2 * spaces - 2;

    if (i != 0 && i != n-1) {
        for (let j = 0; j <= inner; j++) {
            document.write("&nbsp;");
        }
        document.write("*");
    }

    document.write("<br>");
}
</script>

</body>
</html>
